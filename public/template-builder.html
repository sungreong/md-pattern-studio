<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Builder — Markdown Pattern Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d1117; --bg2:#161b22; --bg3:#1c2230;
      --border:rgba(139,180,255,.12); --border-hi:rgba(99,153,255,.35);
      --accent:#5b8ef0; --accent-glow:rgba(91,142,240,.18);
      --text:#e2e8f8; --text-dim:#7a8bab; --text-code:#88b0ff;
      --green:#3ddc84; --red:#ff6b6b; --yellow:#fbbf24;
      --font:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
      --radius:8px; --shadow:0 4px 24px rgba(0,0,0,.45);
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;}

    /* Topbar */
    .topbar{height:48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:relative;z-index:10;}
    .topbar-brand{font-weight:700;font-size:14px;letter-spacing:-.3px;}
    .topbar-brand span{color:var(--accent);}
    .topbar-spacer{flex:1;}
    .topbar-link{font-size:12px;color:var(--text-dim);text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);transition:color .15s,border-color .15s;}
    .topbar-link:hover{color:var(--text);border-color:var(--border-hi);}
    .pill-count{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center;}

    /* Layout */
    .workspace{display:grid;grid-template-columns:210px 1fr 1fr;height:calc(100vh - 48px);overflow:hidden;}

    /* Pane shared */
    .pane{display:flex;flex-direction:column;overflow:hidden;}
    .pane-head{padding:11px 14px 10px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .pane-head .pane-title{flex:1;}
    .pane-body{flex:1;overflow-y:auto;user-select:none;}
    .pane-body::-webkit-scrollbar{width:4px;}
    .pane-body::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}

    /* Palette */
    .pane-palette{border-right:1px solid var(--border);background:var(--bg2);}
    .palette-category{padding:8px 10px 4px;}
    .palette-category-label{font-size:9px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--text-dim);padding:0 2px 6px;display:block;}
    .palette-grid{display:flex;flex-direction:column;gap:3px;padding:0 6px 8px;}

    .palette-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius);border:1px solid transparent;cursor:grab;user-select:none;transition:background .12s,border-color .12s,transform .1s;background:var(--bg3);}
    .palette-item:hover{background:var(--accent-glow);border-color:var(--border-hi);}
    .palette-item:active{transform:scale(.97);cursor:grabbing;}
    .palette-item.dragging{opacity:.35;}
    .palette-item-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
    .palette-item-info{min-width:0;flex:1;}
    .palette-item-label{font-weight:600;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .palette-item-desc{font-size:10px;color:var(--text-dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* Canvas */
    .pane-canvas{background:var(--bg);border-right:1px solid var(--border);}
    .canvas-body{padding:10px;display:flex;flex-direction:column;gap:0;min-height:100%;}

    /* Insertion indicator */
    .insert-indicator{height:2px;background:var(--accent);border-radius:2px;margin:1px 4px;opacity:0;transition:opacity .12s;pointer-events:none;}
    .insert-indicator.active{opacity:1;}

    /* Drop zone (empty state) */
    .drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px 16px;text-align:center;color:var(--text-dim);font-size:12px;transition:border-color .15s,background .15s;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
    .drop-zone.drag-over{border-color:var(--accent);background:var(--accent-glow);color:var(--accent);}
    .drop-zone-icon{font-size:32px;opacity:.4;}

    /* Canvas items */
    .canvas-list{display:flex;flex-direction:column;}
    .canvas-item{display:flex;flex-direction:column;gap:8px;padding:9px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .12s,box-shadow .12s;margin:2px 0;position:relative;}
    .canvas-item:hover{border-color:var(--border-hi);box-shadow:0 2px 12px rgba(0,0,0,.3);}
    .canvas-item.dragging-canvas{opacity:.3;}
    .canvas-item.drop-target-above{border-top:2px solid var(--accent);}
    .canvas-item.drop-target-below{border-bottom:2px solid var(--accent);}

    .item-header {display:flex; align-items:center; gap:8px;}
    .item-drag-handle{cursor:grab;color:var(--text-dim);font-size:14px;flex-shrink:0;padding:0 2px;line-height:1;}
    .item-icon{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
    .item-label{flex:1;font-weight:600;font-size:12px;color:var(--text);}
    .item-desc{font-size:10px;color:var(--text-dim);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .item-action{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:14px;padding:2px 4px;border-radius:4px;transition:color .12s,background .12s;flex-shrink:0;line-height:1;}
    .item-action:hover{color:var(--text);background:rgba(255,255,255,.1);}
    .item-action.remove:hover{color:var(--red);background:rgba(255,107,107,.1);}

    .item-editor {display:none; padding: 4px 6px 0 28px;}
    .item-editor.open {display:block;}
    .item-textarea {width:100%; background:var(--bg3); color:var(--text); font-family:var(--mono); font-size:11px; border:1px solid var(--border); border-radius:4px; padding:6px; resize:vertical; min-height:60px;}
    .item-textarea:focus {outline:none; border-color:var(--accent);}

    .layout-zones {display:flex; gap:8px; margin: 4px 6px 0 28px;}
    .layout-drop-zone {flex:1; border:1px dashed var(--border); border-radius:4px; padding:6px; min-height:48px; display:flex; flex-direction:column; gap:6px; background:rgba(0,0,0,.15); transition:all 0.15s;}
    .layout-drop-zone.drag-over {border-color:var(--accent); background:var(--accent-glow);}
    .zone-title {font-size:10px; color:var(--text-dim); text-align:center; padding-bottom:4px; border-bottom:1px solid var(--border); margin-bottom:2px;}
    .nested-list {display:flex; flex-direction:column; gap:4px; min-height:24px;}
    .nested-item {display:flex; align-items:center; justify-content:space-between; background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:4px 8px; font-size:11px; color:var(--text);}
    .nested-item-remove {background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:14px; line-height:1;}
    .nested-item-remove:hover {color:var(--red);}

    /* Slide Group */
    .slide-group{display:flex;flex-direction:column;gap:0;padding:0 0 6px;background:rgba(192,132,252,.05);border:1.5px solid rgba(192,132,252,.3);border-radius:var(--radius);margin:2px 0;position:relative;transition:border-color .12s;}
    .slide-group:hover{border-color:rgba(192,132,252,.6);}
    .slide-group.dragging-canvas{opacity:.3;}
    .slide-group.drop-target-above{border-top:2px solid var(--accent);}
    .slide-group.drop-target-below{border-bottom:2px solid var(--accent);}
    .slide-group-header{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px dashed rgba(192,132,252,.2);cursor:default;}
    .slide-group-badge{font-size:9px;font-weight:700;letter-spacing:.8px;padding:2px 7px;border-radius:20px;background:rgba(192,132,252,.18);color:#c084fc;text-transform:uppercase;flex-shrink:0;}
    .slide-group-label{flex:1;font-weight:600;font-size:12px;color:var(--text);}
    .slide-group-desc{font-size:10px;color:var(--text-dim);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .slide-content-area{padding:6px 10px 4px;display:flex;flex-direction:column;gap:6px;}
    .slide-content-zone{border:1px dashed rgba(192,132,252,.3);border-radius:4px;padding:6px 8px;min-height:40px;display:flex;flex-direction:column;gap:4px;background:rgba(0,0,0,.12);transition:all 0.15s;}
    .slide-content-zone.drag-over{border-color:#c084fc;background:rgba(192,132,252,.1);}
    .slide-content-zone.drag-over-blocked{border-color:var(--red);background:rgba(255,107,107,.08);}
    .slide-content-zone-label{font-size:10px;color:rgba(192,132,252,.6);margin-bottom:2px;}
    .slide-layout-zones{display:flex;gap:6px;}

    .canvas-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-dim);padding:48px 20px;text-align:center;flex:1;}
    .canvas-empty-icon{font-size:36px;opacity:.3;}
    .canvas-empty-title{font-weight:600;font-size:14px;}
    .canvas-empty-sub{font-size:11px;line-height:1.6;}

    /* Canvas footer */
    .canvas-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
    .btn{padding:7px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;transition:opacity .15s,transform .1s;}
    .btn:active{transform:scale(.97);}
    .btn:disabled{opacity:.4;cursor:not-allowed;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover:not(:disabled){opacity:.85;}
    .btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
    .btn-secondary:hover:not(:disabled){border-color:var(--border-hi);}
    .btn-ghost{background:none;color:var(--text-dim);border:1px solid transparent;}
    .btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--border-hi);}
    .btn-danger{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.2);}
    .btn-danger:hover:not(:disabled){background:rgba(255,107,107,.22);}

    /* Preview */
    .pane-preview{background:var(--bg2);}
    .preview-tabs{display:flex;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;}
    .preview-tab{padding:9px 14px;font-size:11px;font-weight:600;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font);}
    .preview-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .preview-tab:hover:not(.active){color:var(--text);}

    .preview-zoom {display:flex;gap:2px;align-items:center;padding-right:8px;}
    .zoom-btn {background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:14px;line-height:1;}
    .zoom-btn:hover {background:var(--bg3);color:var(--text);}
    .zoom-text {font-size:11px;color:var(--text-dim);min-width:36px;text-align:center;user-select:none;}

    .preview-panel{flex:1;overflow:hidden;position:relative;}
    #previewMd{font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--text);white-space:pre;overflow:auto;padding:14px;height:100%;}
    #previewMd::-webkit-scrollbar{width:4px;}
    #previewMd::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}
    .preview-frame {width:100%; height:100%; border:none; border-top-left-radius: 8px; border-bottom-left-radius: 8px;}

    /* Inject custom style into the preview via JS if needed, but the main app.js engine will render it */
    .hide-h2 > h2 { display: none !important; }
    .md-h1{color:#88b0ff;font-weight:bold;}
    .md-h2{color:#82c4ff;font-weight:bold;}
    .md-h3{color:#7de2d1;font-weight:bold;}
    .md-attr{color:#c792ea;}
    .md-fence{color:#f78c6c;}
    .md-sep{color:#546e7a;font-style:italic;}

    .preview-empty-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-dim);padding:48px 20px;text-align:center;height:100%;}
    .preview-empty-msg-icon{font-size:32px;opacity:.3;}

    /* Toast */
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:var(--radius);font-size:12px;box-shadow:var(--shadow);opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap;}
    #toast.show{opacity:1;}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">MPS <span>·</span> Template Builder</div>
  <div class="topbar-spacer"></div>
  <span id="countBadge" class="pill-count">0</span>
  
  <div class="topbar-actions" style="display:flex; gap:8px; margin-left:16px;">
    <button class="btn btn-secondary" id="btnCopy" disabled style="padding:4px 10px; font-size:12px;">📋 복사</button>
    <button class="btn btn-primary" id="btnDownload" disabled style="padding:4px 10px; font-size:12px;">↓ .md 저장</button>
    <button class="btn btn-primary" id="btnInsertVscode" disabled style="display:none; padding:4px 10px; font-size:12px;">✨ 에디터에 삽입</button>
  </div>
  
  <a href="/" class="topbar-link" style="margin-left:16px;">← Studio</a>
</div>

<div class="workspace">

  <!-- 블록 팔레트 -->
  <aside class="pane pane-palette">
    <div class="pane-head"><span class="pane-title">블록 라이브러리</span></div>
    <div class="pane-body" id="paletteBody"></div>
  </aside>

  <!-- 조립 캔버스 -->
  <section class="pane pane-canvas">
    <div class="pane-head"><span class="pane-title">조립 순서</span></div>
    <div class="pane-body canvas-body" id="canvasBody">
      <div class="canvas-list" id="canvasList"></div>
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">⊕</div>
        <div>왼쪽 블록을 드래그해 추가</div>
        <div style="font-size:11px;margin-top:4px;opacity:.7">목록이 생기면 항목 사이에도 삽입 가능합니다</div>
      </div>
    </div>
    <div class="canvas-footer">
      <button class="btn btn-ghost" id="btnOpenStudio" disabled>Studio에서 열기</button>
      <span style="flex:1"></span>
      <button class="btn btn-danger" id="btnClear" disabled>초기화</button>
    </div>
  </section>

  <!-- 미리보기 -->
  <aside class="pane pane-preview">
    <div class="pane-head" style="padding:0;border-bottom:none;">
      <div class="preview-tabs" style="width:100%; display:flex; align-items:center;">
        <button class="preview-tab active" data-tab="rendered">🖥 렌더 미리보기</button>
        <button class="preview-tab" data-tab="md">📝 마크다운</button>
        <div style="flex:1"></div>
        <select id="docThemeSelect" style="margin-right:12px; font-size:12px; padding:3px 6px; border-radius:4px; border:1px solid var(--border); background:var(--bg2); color:var(--text);">
          <option value="report">단일 보고서 뷰어</option>
          <option value="presentation">슬라이드 페이지형 뷰어</option>
        </select>
        <div class="preview-zoom" id="previewZoom">
          <button class="zoom-btn" id="btnZoomOut">-</button>
          <span class="zoom-text" id="zoomValue">100%</span>
          <button class="zoom-btn" id="btnZoomIn">+</button>
        </div>
      </div>
    </div>
    <div class="preview-panel">
      <!-- 탭 포커스 및 단축키 바인딩 처리를 위한 tabindex 추가 -->
      <div id="previewMd" tabindex="0" style="outline:none; user-select:text;" hidden></div>
      <iframe id="previewRendered" title="렌더 미리보기" sandbox="allow-scripts"></iframe>
    </div>
  </aside>

</div>

<div id="toast"></div>

<script type="module">
import { SNIPPETS, SNIPPET_CATEGORIES } from '/core/snippets.js';
import { parseMarkdownDocument, renderDocument, registerBuiltInTemplates } from '/core/engine.js';
import { TemplateRegistry } from '/core/registry.js';

const registry = new TemplateRegistry();
registerBuiltInTemplates(registry);

// 카테고리 메타
const CAT_META = {
  basic:   { icon:'📝', color:'#5b8ef0', bg:'rgba(91,142,240,.15)' },
  layout:  { icon:'⬛', color:'#3ddc84', bg:'rgba(61,220,132,.12)' },
  content: { icon:'📊', color:'#fbbf24', bg:'rgba(251,191,36,.12)' },
  slide:   { icon:'🎞️', color:'#c084fc', bg:'rgba(192,132,252,.12)' },
  utility: { icon:'🔧', color:'#7a8bab', bg:'rgba(122,139,171,.12)' },
};
const CAT_ORDER = ['basic','layout','content','slide','utility'];

// ── State ──
let canvasItems = [];
let drag = null;   // { type:'palette'|'canvas', name?, id? }
let idSeq = 0;
let userChangedTheme = false;

// ── DOM ──
const paletteBody   = document.getElementById('paletteBody');
const canvasList    = document.getElementById('canvasList');
const dropZone      = document.getElementById('dropZone');
const countBadge    = document.getElementById('countBadge');
const btnDownload   = document.getElementById('btnDownload');
const btnCopy       = document.getElementById('btnCopy');
const btnOpenStudio = document.getElementById('btnOpenStudio');
const btnClear      = document.getElementById('btnClear');
const previewMd     = document.getElementById('previewMd');
const previewFrame  = document.getElementById('previewRendered');
const previewZoom   = document.getElementById('previewZoom');
const btnZoomIn     = document.getElementById('btnZoomIn');
const btnZoomOut    = document.getElementById('btnZoomOut');
const zoomValue     = document.getElementById('zoomValue');

// ── Zoom logic ──
let scale = 1.0;
function updateZoom() {
  zoomValue.textContent = Math.round(scale * 100) + '%';
  previewFrame.style.width = `${100 / scale}%`;
  previewFrame.style.height = `${100 / scale}%`;
  previewFrame.style.transform = `scale(${scale})`;
  previewFrame.style.transformOrigin = `0 0`;
}
btnZoomIn.addEventListener('click', () => { scale = Math.min(2.0, scale + 0.1); updateZoom(); });
btnZoomOut.addEventListener('click', () => { scale = Math.max(0.3, scale - 0.1); updateZoom(); });
updateZoom();

// ── Build Palette ──
function buildPalette() {
  const groups = {};
  SNIPPETS.forEach(s => { (groups[s.category] = groups[s.category] || []).push(s); });

  CAT_ORDER.forEach(cat => {
    if (!groups[cat]) return;
    const m = CAT_META[cat] || CAT_META.utility;
    const sec = document.createElement('div');
    sec.className = 'palette-category';
    sec.innerHTML = `<span class="palette-category-label">${SNIPPET_CATEGORIES[cat] || cat}</span>`;

    const grid = document.createElement('div');
    grid.className = 'palette-grid';

    groups[cat].forEach(s => {
      const el = document.createElement('div');
      el.className = 'palette-item';
      el.draggable = true;
      el.dataset.name = s.name;
      el.innerHTML = `
        <div class="palette-item-icon" style="background:${m.bg};color:${m.color}">${m.icon}</div>
        <div class="palette-item-info">
          <div class="palette-item-label">${s.label}</div>
          <div class="palette-item-desc">${s.description}</div>
        </div>`;

      el.addEventListener('dragstart', e => {
        drag = { type:'palette', name: s.name };
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'copy';
        e.dataTransfer.setData('text/plain', s.name);
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        drag = null;
        clearHints();
      });

      grid.appendChild(el);
    });
    sec.appendChild(grid);
    paletteBody.appendChild(sec);
  });
}

// ── Drop Zone (empty canvas) ──
dropZone.addEventListener('dragover', e => {
  if (!drag) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = drag.type === 'palette' ? 'copy' : 'move';
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (!drag) return;
  if (drag.type === 'palette') addItem(drag.name, null);
  else if (drag.type === 'canvas') moveItem(drag.id, null);
});

// ── Canvas DnD (reorder + mid-list insertion + nested drop) ──
canvasList.addEventListener('dragover', e => {
  if (!drag) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = drag.type === 'palette' ? 'copy' : 'move';
  clearHints();

  // nested-item 위 (layout-drop-zone 내부 아이템)
  const nestedTarget = e.target.closest('.nested-item');
  if (nestedTarget) {
    const rect = nestedTarget.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    nestedTarget.classList.add(e.clientY < mid ? 'drop-target-above' : 'drop-target-below');
    nestedTarget.dataset.dropPos = e.clientY < mid ? 'above' : 'below';
    return;
  }

  // layout-drop-zone (슬라이드 컬럼 존)
  const layoutZone = e.target.closest('.layout-drop-zone');
  if (layoutZone) { layoutZone.classList.add('drag-over'); return; }

  // slide-content-zone (슬라이드 그룹 콘텐츠 존)
  const slideZone = e.target.closest('.slide-content-zone');
  if (slideZone) {
    const dragCat = drag.type === 'palette'
      ? SNIPPETS.find(x => x.name === drag.name)?.category
      : canvasItems.find(i => i.id === drag.id)?.snippet?.category;
    const isSlide = dragCat === 'slide';
    slideZone.classList.add(isSlide ? 'drag-over-blocked' : 'drag-over');
    return;
  }

  // slide-group 카드 위 (루트 재배치)
  const slideGroup = e.target.closest('.slide-group');
  if (slideGroup && !e.target.closest('.slide-content-zone') && !e.target.closest('.layout-drop-zone')) {
    const rect = slideGroup.getBoundingClientRect();
    const mid  = rect.top + rect.height / 2;
    slideGroup.classList.add(e.clientY < mid ? 'drop-target-above' : 'drop-target-below');
    slideGroup.dataset.dropPos = e.clientY < mid ? 'above' : 'below';
    return;
  }

  // 일반 canvas-item 위
  const target = e.target.closest('.canvas-item');
  if (!target) return;
  const rect = target.getBoundingClientRect();
  const mid  = rect.top + rect.height / 2;
  target.classList.add(e.clientY < mid ? 'drop-target-above' : 'drop-target-below');
  target.dataset.dropPos = e.clientY < mid ? 'above' : 'below';
});
canvasList.addEventListener('dragleave', e => {
  if (!canvasList.contains(e.relatedTarget)) clearHints();
});
canvasList.addEventListener('drop', e => {
  e.preventDefault();
  clearHints();
  if (!drag) return;

  // ── 드롭 아이템 생성 (palette) 또는 추출 (canvas 재배치) ──
  let droppedItem = null;
  let dragSnippet = null;
  if (drag.type === 'palette') {
    const s = SNIPPETS.find(x => x.name === drag.name);
    if (s) {
      dragSnippet = s;
      if (s.category === 'slide') {
        droppedItem = { id: ++idSeq, snippet: s, text: s.text || '', isSlideGroup: true, items: [] };
        if (s.layoutCols) {
          droppedItem.children = {};
          s.layoutCols.forEach(col => droppedItem.children[col] = []);
        }
      } else {
        droppedItem = { id: ++idSeq, snippet: s, text: s.text || s.snippet || '' };
        if (s.layoutCols) {
          droppedItem.children = {};
          s.layoutCols.forEach(col => droppedItem.children[col] = []);
        }
      }
    }
  } else if (drag.type === 'canvas') {
    let found = null;
    let parentList = null;
    const searchItem = (list) => {
      const idx = list.findIndex(i => i.id === drag.id);
      if (idx !== -1) { found = list[idx]; parentList = list; return; }
      for (const item of list) {
        if (item.children) Object.values(item.children).forEach(cl => searchItem(cl));
        if (item.items) searchItem(item.items);
      }
    };
    searchItem(canvasItems);
    if (found && parentList) {
      droppedItem = found;
      dragSnippet = found.snippet;
      parentList.splice(parentList.indexOf(found), 1);
    }
  }

  if (!droppedItem) return;
  const isSlide = dragSnippet?.category === 'slide' || droppedItem?.isSlideGroup;

  // 1. Nested Item 위에 드롭 (형제 간 삽입 — layout-drop-zone 내부 nested)
  const nestedTarget = e.target.closest('.nested-item');
  if (nestedTarget) {
    const targetId = Number(nestedTarget.dataset.id);
    const pos = nestedTarget.dataset.dropPos;
    let targetList = null, targetIdx = -1;
    const findInCanvasItem = (item) => {
      if (item.children) {
        for (const colList of Object.values(item.children)) {
          const idx = colList.findIndex(i => i.id === targetId);
          if (idx !== -1) { targetList = colList; targetIdx = idx; return true; }
        }
      }
      if (item.items) {
        const idx = item.items.findIndex(i => i.id === targetId);
        if (idx !== -1) { targetList = item.items; targetIdx = idx; return true; }
      }
      return false;
    };
    for (const item of canvasItems) { if (findInCanvasItem(item)) break; }
    if (targetList) {
      targetList.splice(pos === 'above' ? targetIdx : targetIdx + 1, 0, droppedItem);
      render(); return;
    }
  }

  // 2. layout-drop-zone (슬라이드 그룹의 컬럼 존)
  const layoutZone = e.target.closest('.layout-drop-zone');
  if (layoutZone) {
    const targetId = Number(layoutZone.dataset.id);
    const colName = layoutZone.dataset.col;
    if (drag.id === targetId) return;
    const targetItem = canvasItems.find(i => i.id === targetId);
    if (targetItem) {
      if (!targetItem.children) targetItem.children = {};
      if (!targetItem.children[colName]) targetItem.children[colName] = [];
      targetItem.children[colName].push(droppedItem);
    }
    render(); return;
  }

  // 3. slide-content-zone (슬라이드 그룹 내 콘텐츠 존)
  const slideZone = e.target.closest('.slide-content-zone');
  if (slideZone) {
    if (isSlide) {
      // 슬라이드는 슬라이드 그룹 안에 넣을 수 없음
      showToast('⛔ 슬라이드 안에 슬라이드를 넣을 수 없습니다');
      // 꺼낸 아이템 되돌리기
      if (drag.type === 'canvas') canvasItems.push(droppedItem);
      render(); return;
    }
    const targetId = Number(slideZone.dataset.id);
    const targetItem = canvasItems.find(i => i.id === targetId);
    if (targetItem) targetItem.items.push(droppedItem);
    render(); return;
  }

  // 4. slide-group 위에 드롭 (루트 목록 재배치)
  const slideGroupTarget = e.target.closest('.slide-group');
  if (slideGroupTarget && !e.target.closest('.slide-content-zone') && !e.target.closest('.layout-drop-zone')) {
    const pos = slideGroupTarget.dataset.dropPos;
    const targetId = Number(slideGroupTarget.dataset.id);
    const idx = canvasItems.findIndex(i => i.id === targetId);
    if (idx !== -1) {
      canvasItems.splice(pos === 'above' ? idx : idx + 1, 0, droppedItem);
      render(); return;
    }
  }

  // 5. canvas-item 위에 드롭 (루트 목록 재배치)
  const rootTarget = e.target.closest('.canvas-item');
  if (rootTarget) {
    const pos = rootTarget.dataset.dropPos;
    const targetId = Number(rootTarget.dataset.id);
    const idx = canvasItems.findIndex(i => i.id === targetId);
    if (idx !== -1) {
      canvasItems.splice(pos === 'above' ? idx : idx + 1, 0, droppedItem);
      render(); return;
    }
  }

  // 6. 허공 → 맨 뒤 추가
  canvasItems.push(droppedItem);
  render();
});

function clearHints() {
  document.querySelectorAll('.canvas-item, .nested-item, .slide-group').forEach(el => {
    el.classList.remove('drop-target-above','drop-target-below');
    delete el.dataset.dropPos;
  });
  document.querySelectorAll('.layout-drop-zone, .slide-content-zone').forEach(el => {
    el.classList.remove('drag-over', 'drag-over-blocked');
  });
  dropZone.classList.remove('drag-over');
}

// ── Data ops ──
function addItem(name, beforeId) {
  const s = SNIPPETS.find(x => x.name === name);
  if (!s) return;

  let item;
  if (s.category === 'slide') {
    // 슬라이드 카테고리 → Slide Group 래퍼로 생성
    item = { id: ++idSeq, snippet: s, text: s.text || '', isSlideGroup: true, items: [] };
    if (s.layoutCols) {
      item.children = {};
      s.layoutCols.forEach(col => item.children[col] = []);
    }
  } else {
    const text = s.text || s.snippet || '';
    item = { id: ++idSeq, snippet: s, text };
    if (s.layoutCols) {
      item.children = {};
      s.layoutCols.forEach(col => item.children[col] = []);
    }
  }

  if (beforeId === null) {
    canvasItems.push(item);
  } else {
    const idx = canvasItems.findIndex(i => i.id === beforeId);
    canvasItems.splice(idx < 0 ? canvasItems.length : idx, 0, item);
  }
  render();
}

function moveItem(fromId, beforeId) {
  const fromIdx = canvasItems.findIndex(i => i.id === fromId);
  if (fromIdx < 0) return;
  const [moved] = canvasItems.splice(fromIdx, 1);
  if (beforeId === null) {
    canvasItems.push(moved);
  } else {
    const toIdx = canvasItems.findIndex(i => i.id === beforeId);
    canvasItems.splice(toIdx < 0 ? canvasItems.length : toIdx, 0, moved);
  }
  render();
}

function removeItem(id) {
  const searchAndRemove = (list) => {
    const idx = list.findIndex(i => i.id === id);
    if (idx !== -1) { list.splice(idx, 1); return true; }
    for (const item of list) {
      if (item.children) {
        for (const colList of Object.values(item.children)) {
          if (searchAndRemove(colList)) return true;
        }
      }
      if (item.items && searchAndRemove(item.items)) return true;
    }
    return false;
  };
  searchAndRemove(canvasItems);
  render();
}

}

        header.addEventListener('dragend', () => {

        el.querySelector('.edit').addEventListener('click', () => {
          const ed = el.querySelector('.item-editor');

        el.querySelector('.item-textarea').addEventListener('input', ev => {

        el.querySelector('.remove').addEventListener('click', () => removeItem(item.id));

          nestedEl.addEventListener('dragstart', ev => {

            drag = { type: 'canvas', id: Number(nestedEl.dataset.id) };
            nestedEl.style.opacity = '0.5';
            ev.dataTransfer.effectAllowed = 'move';
          });
          nestedEl.addEventListener('dragend', ev => {

  const has = canvasItems.length > 0;
  btnDownload.disabled = btnCopy.disabled = btnOpenStudio.disabled = btnClear.disabled = !has;
  if (btnInsertVscode) btnInsertVscode.disabled = !has;

// ── Markdown ──
const PAGE_BREAK_MD = '\n\n---\n{: .page-break}\n';

function buildMdNode(item, depthLevel) {
  let md = item.text || '';

  // 헤더 레벨 보정 (레이아웃 블록 제외)
  if (!item.snippet.layoutCols) {
    if (depthLevel === 'root') {
      md = md.replace(/^#\s+/gm, '## ').replace(/^###\s+/gm, '## ');
    } else if (depthLevel === 'nested') {
      md = md.replace(/^##\s+/gm, '#### ').replace(/^###\s+/gm, '#### ');
    }
  }

  // 레이아웃 컬럼 자식 주입
  if (item.snippet.layoutCols && item.children) {
    item.snippet.layoutCols.forEach(col => {
      const colTitleRegex = new RegExp(`(###\\s+${col}\\n)`);
      const childrenArr = item.children[col] || [];
      const colMd = childrenArr.map(c => buildMdNode(c, 'nested')).join('\n\n') + (childrenArr.length ? '\n' : '');
      md = md.replace(colTitleRegex, `$1\n${colMd}\n`);
    });
  }

  return md.trim();
}

function buildSlideGroupMd(item) {
  // 슬라이드 본문 (page-break 없는 깨끗한 버전)
  let slideMd = (item.text || '').trim();
  // 헤더는 항상 ##로 강제 정규화
  slideMd = slideMd.replace(/^#\s+/gm, '## ').replace(/^###\s+(?!As-Is|To-Be)/gm, '## ');

  // 레이아웃 컬럼 자식 주입 (Compare 2-up 등)
  if (item.snippet.layoutCols && item.children) {
    item.snippet.layoutCols.forEach(col => {
      const colTitleRegex = new RegExp(`(###\\s+${col}\\n?)`);
      const childrenArr = item.children[col] || [];
      const colMd = childrenArr.map(c => buildMdNode(c, 'nested')).join('\n\n');
      slideMd = slideMd.replace(colTitleRegex, `### ${col}\n\n${colMd}\n`);
    });
  }

  // 슬라이드 그룹 내 추가 콘텐츠 items[]
  const extraItems = (item.items || []);
  const extraMd = extraItems.length
    ? '\n\n' + extraItems.map(c => buildMdNode(c, 'nested')).join('\n\n')
    : '';

  return slideMd + extraMd + PAGE_BREAK_MD;
}

function buildMd() {
  const theme = document.getElementById('docThemeSelect')?.value || 'report';
  const frontmatter = theme === 'presentation'
    ? `---\ntitle: "Presentation Template"\ntheme: "presentation"\n---\n\n`
    : `---\ntitle: "Document Template"\ntheme: "report"\n---\n\n`;

  const bodyParts = canvasItems.map((item, idx) => {
    if (item.isSlideGroup) {
      return buildSlideGroupMd(item);
    }
    let output = buildMdNode(item, 'root');
    if (idx > 0 && canvasItems[idx - 1].snippet?.layoutCols && !/^#+\s/m.test(output)) {
      output = `## \u200B {: .hide-h2 }\n\n` + output;
    }
    return output;
  });

  return frontmatter + bodyParts.join('\n\n') + '\n';
}

// ── Preview ──
let activeTab = 'rendered';

function updatePreview() {
  const md = canvasItems.length ? buildMd() : '';

  if (!md) {
    previewFrame.srcdoc = emptyFrameHtml();
    previewMd.innerHTML = `<div class="preview-empty-msg"><div class="preview-empty-msg-icon">📄</div><div>블록을 추가하면 여기에 표시됩니다</div></div>`;
    return;
  }

  // Rendered
  try {
    const model   = parseMarkdownDocument(md);
    const theme   = model.meta.theme || 'report';
    const html    = renderDocument(model, { theme, mode:'web', enableMermaid:true, enableCodeCopy:false }, registry);
    if (theme === 'presentation') {
      previewFrame.srcdoc = buildSlideViewerHtml(html);
    } else {
      previewFrame.srcdoc = buildFrameHtml(html);
    }
  } catch (err) {
    previewFrame.srcdoc = `<body style="font-family:sans-serif;padding:16px;color:#c00">렌더 오류: ${err.message}</body>`;
  }

  // Markdown tab
  const lines = md.split('\n');
  const highlighted = lines.map(l => {
    const e = l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (/^# /.test(l))  return `<span class="md-h1">${e}</span>`;
    if (/^## /.test(l)) return `<span class="md-h2">${e}</span>`;
    if (/^### /.test(l))return `<span class="md-h3">${e}</span>`;
    if (/^\{:/.test(l)) return `<span class="md-attr">${e}</span>`;
    if (/^```/.test(l)) return `<span class="md-fence">${e}</span>`;
    if (/^---/.test(l)) return `<span class="md-sep">${e}</span>`;
    return e;
  }).join('\n');
  previewMd.innerHTML = highlighted;
}

function emptyFrameHtml() {
  return `<!doctype html><html><body style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:80vh;color:#aaa;font-size:13px;margin:0">블록을 추가하면 여기에 표시됩니다</body></html>`;
}

function buildFrameHtml(renderedHtml) {
  const base = window.__MPS_PUBLIC_URI__ || '';

    body{margin:0;padding:16px 24px;background:#fff;}
    .studio-document{max-width:900px;margin:0 auto;}
    .hide-h2 > h2 { display: none !important; }
  </style>
</head>
<body>${renderedHtml}</body></html>`;

function buildSlideViewerHtml(renderedHtml) {
  const base = window.__MPS_PUBLIC_URI__ || '';
  const cssHref = base ? `${base}/document.css` : '/document.css';
  return `<!doctype html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="${cssHref}"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      margin: 0;
      background: #0f1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }
    /* ── Slide stage ── */
    #stage {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }
    /* Hide original shell and show only active page */
    .document-shell { display: contents !important; }
    .doc-page {
      display: none;
      width: min(100%, 820px);
      max-height: calc(100vh - 80px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.1);
      background: #fff;
      overflow: hidden;
      animation: slideIn .22s ease;
    }
    .doc-page.active { display: flex; flex-direction: column; }
    .doc-page-inner {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      border-radius: 0;
      border: none;
    }
    .doc-page-footer {
      padding: 10px 20px;
      background: rgba(0,0,0,.04);
      border-top: 1px solid rgba(0,0,0,.07);
      font-size: 12px;
      color: #888;
      text-align: right;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* ── Nav bar ── */
    #nav {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 10px 20px;
      background: rgba(255,255,255,.05);
      border-top: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
    }
    .nav-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      color: #ddd;
      border-radius: 8px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
      font-family: inherit;
    }
    .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,.2); color: #fff; }
    .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
    #slideCounter {
      font-size: 13px;
      color: #aaa;
      min-width: 80px;
      text-align: center;
      user-select: none;
    }
    /* 진행 바 */
    #progressBar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: #5b8ef0;
      transition: width .25s ease;
      z-index: 99;
    }
    .hide-h2 > h2 { display: none !important; }
  </style>
</head>
<body>
<div id="progressBar"></div>
<div id="stage">${renderedHtml}</div>
<nav id="nav">
  <button class="nav-btn" id="btnPrev">← 이전</button>
  <span id="slideCounter">1 / ?</span>
  <button class="nav-btn" id="btnNext">다음 →</button>
</nav>
<script>
  const pages = document.querySelectorAll('.doc-page');
  const total = pages.length;
  let current = 0;

  function show(idx) {
    pages.forEach((p, i) => p.classList.toggle('active', i === idx));
    document.getElementById('slideCounter').textContent = (idx + 1) + ' / ' + total;
    document.getElementById('btnPrev').disabled = idx === 0;
    document.getElementById('btnNext').disabled = idx === total - 1;
    document.getElementById('progressBar').style.width = ((idx + 1) / total * 100) + '%';
    current = idx;
  }

  document.getElementById('btnPrev').addEventListener('click', () => { if (current > 0) show(current - 1); });
  document.getElementById('btnNext').addEventListener('click', () => { if (current < total - 1) show(current + 1); });

  // 키보드 지원 (화살표 / Space)
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
      e.preventDefault();
      if (current < total - 1) show(current + 1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      if (current > 0) show(current - 1);
    }
  });

  if (total === 0) {
    document.getElementById('nav').style.display = 'none';
  } else {
    show(0);
  }
<\/script>
</body></html>`;
}

// ── Tab & Theme switching ──
document.querySelectorAll('.preview-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.preview-tab').forEach(b => b.classList.toggle('active', b === btn));
    previewMd.hidden     = activeTab !== 'md';
    previewFrame.hidden  = activeTab !== 'rendered';
    previewZoom.style.display = activeTab === 'rendered' ? 'flex' : 'none';
    
    // 마크다운 탭으로 이동 시 Ctrl+A 편의성을 위해 포커스 처리
    if (activeTab === 'md') {
      previewMd.focus();
    }
  });
});

// 마크다운 컨테이너 내부에서 Ctrl+A / Cmd+A 입력 시 마크다운 내용만 전체 텍스트 블록 지정되도록 트리거
previewMd.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && (e.key === 'a' || e.key === 'A')) {
    e.preventDefault();
    const selection = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(previewMd.querySelector('code') || previewMd);
    selection.removeAllRanges();
    selection.addRange(range);
  }
});

document.getElementById('docThemeSelect').addEventListener('change', () => {
  userChangedTheme = true;
  render(); // Re-build MD and update preview
});

// ── Actions ──
const IS_VSCODE = typeof acquireVsCodeApi === 'function';
const vscode = IS_VSCODE ? acquireVsCodeApi() : null;

const btnInsertVscode = document.getElementById('btnInsertVscode');

if (IS_VSCODE) {
  btnDownload.textContent = 'VS Code 템플릿 생성';
  btnInsertVscode.style.display = 'inline-block';
  btnOpenStudio.style.display = 'none'; // VS Code 내에서는 Studio 열기 숨김
}

btnDownload.addEventListener('click', () => {
  const md = buildMd();
  if (vscode) {
    vscode.postMessage({ type: 'generate', markdown: md });
  } else {
    const url = URL.createObjectURL(new Blob([md], { type:'text/markdown;charset=utf-8' }));
    Object.assign(document.createElement('a'), { href:url, download:'template.md' }).click();
    URL.revokeObjectURL(url);
    showToast('template.md 다운로드 완료 ✓');
  }
});

if (btnInsertVscode) {
  btnInsertVscode.addEventListener('click', () => {
    const md = buildMd();
    if (vscode && md) {
      vscode.postMessage({ type: 'insert', markdown: md });
    }
  });
}

btnCopy.addEventListener('click', async () => {
  const md = buildMd();
  if (vscode) {
    vscode.postMessage({ type: 'copy', markdown: md });
  } else {
    try {
      await navigator.clipboard.writeText(md);
      showToast('클립보드에 복사됐습니다 ✓');
    } catch { showToast('복사 실패 — 브라우저 권한 확인 필요'); }
  }
});

btnOpenStudio.addEventListener('click', () => {
  localStorage.setItem('markdown-pattern-studio:markdown', buildMd());
  window.location.href = '/';
});

btnClear.addEventListener('click', () => {
  if (!canvasItems.length || !confirm(`${canvasItems.length}개 블록을 모두 제거하시겠습니까?`)) return;
  canvasItems = [];
  render();
  showToast('초기화 완료');
});

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Init ──
buildPalette();
render();
</script>
</body>
</html>
